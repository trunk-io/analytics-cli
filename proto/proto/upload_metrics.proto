syntax = "proto3";

package trunk.oss.flakytests_cli.v1;

import "common.proto";
import "google/protobuf/timestamp.proto";

enum QuarantineQueryResult {
  // Default; should not be sent from new CLI versions in practice.
  QUARANTINE_QUERY_RESULT_UNSPECIFIED = 0;
  // Successfully retrieved quarantined test results from the API.
  QUARANTINE_QUERY_RESULT_SUCCESS = 1;
  // Query failed (includes auth errors like 403/404; not differentiated yet).
  QUARANTINE_QUERY_RESULT_FAILURE = 2;
  // Disabled via CLI flag/env var or repo setting from the DB.
  QUARANTINE_QUERY_RESULT_DISABLED = 3;
  // No tests failed; quarantine lookup was not needed.
  QUARANTINE_QUERY_RESULT_SKIPPED = 4;
  // RSpec only: quarantined results served from disk cache.
  QUARANTINE_QUERY_RESULT_CACHED = 5;
}

message UploadMetrics {
  Semver client_version = 1;
  Repo repo = 2;
  google.protobuf.Timestamp cli_started_at = 3;
  google.protobuf.Timestamp upload_started_at = 4;
  google.protobuf.Timestamp upload_finished_at = 5;
  bool failed = 6;
  string failure_reason = 7;
  QuarantineQueryResult quarantine_query_result = 8;
}

// Used by the analytics-uploader, kept here to avoid collisions in the future.
message UploaderUploadMetrics {
  Semver uploader_version = 1;
  Repo repo = 2;
  bool failed = 3;
  string failure_reason = 4;
}
