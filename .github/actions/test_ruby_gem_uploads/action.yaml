name: Test Ruby Gem Release
description: Run stable tests for a Ruby gem release
author: trunk.io

inputs:
  ruby-version:
    description: Ruby versions to test
    required: true
  artifact-pattern:
    default: cross-gem-*
    description: Artifact pattern to download
    required: false

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ inputs.ruby-version }}
        bundler-cache: true
        working-directory: ${{ github.action_path }}

    - uses: actions/download-artifact@v4
      with:
        pattern: ${{ inputs.artifact-pattern }}
        path: ${{ github.action_path }}/pkg
        merge-multiple: true

    - name: Run tests
      id: run-tests
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        gem install pkg/rspec_trunk_flaky_tests-*.gem
        bundle install --local
        bundle info rspec_trunk_flaky_tests 
        bundle exec rspec spec/test_spec.rb
      env:
        TRUNK_PUBLIC_API_ADDRESS: https://api.trunk-staging.io
        TRUNK_ORG_URL_SLUG: trunk-staging-org
        TRUNK_API_TOKEN: ${{ secrets.TRUNK_STAGING_ORG_API_TOKEN }}
