# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.10.0
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - rust@SYSTEM
    - node@25.9.0
    - python@3.14.4
    - ruby@4.0.5
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    # handled by cargo-fmt already
    - rustfmt
  enabled:
    - grype@0.110.0
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - rubocop@1.87.0
    - actionlint@1.7.12
    - bandit@1.9.4
    - black@26.5.1
    - checkov@3.3.1
    - clippy@SYSTEM
    - eslint@9.39.2!
    - git-diff-check
    - isort@8.0.1
    - markdownlint@0.48.0
    - osv-scanner@2.3.8
    - prettier@3.8.4
    - ruff@0.15.16
    - cargo-fmt@SYSTEM
    - taplo@0.10.0
    - trufflehog@3.95.5
    - yamllint@1.38.0
    - pyright@1.1.410
  definitions:
    - name: eslint
      commands:
        - name: lint
          run_when: [cli, monitor, ci]
          run_from: ${root_or_parent_with(package.json)}
    - name: pyright
      commands:
        - name: lint
          run: pyright -p context-py --outputjson
          target: .
          batch: false
    - name: clippy
      commands:
        - name: lint
          # Run clippy directly in CI using prepare-rs/action.yaml
          run: cargo clippy --message-format json --locked --all-targets --all-features -- --cap-lints=warn --no-deps
          run_when: [cli]
          run_from: ${root_or_parent_with_regex(Cargo.lock)}
    - name: cargo-fmt
      commands:
        - name: format
          run: cargo fmt
          # Run cargo fmt and check in CI using prepare-rs/action.yaml
          run_when: [cli]
          files: [rust]
          run_from: ${root_or_parent_with_regex(Cargo.lock)}
          output: rewrite
          batch: true
          in_place: true
          formatter: true
          cache_results: false
          sandbox_type: copy_targets
          success_codes: [0, 1]
  ignore:
    - linters: [ALL]
      paths:
        # Ignore generated files
        - target/**
        - "**/target/**"
    - linters: [prettier]
      paths:
        - context/test_fixtures/*.json
        - cli/test_fixtures/*.json
    - linters: [rubocop]
      paths:
        - .github/actions/test_ruby_gem_uploads/Gemfile
actions:
  definitions:
    - id: generate-pyi
      runtime: rust
      description: Generate Python stubs
      # Don't use hermetic runtime so we can use nightly cargo
      run: |
        cargo run --bin stub_gen --manifest-path context-py/Cargo.toml --no-default-features
  enabled:
    - generate-pyi
    - git-lfs
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
downloads:
  - name: ruby-build
    downloads:
      - url: https://raw.githubusercontent.com/trunk-io/analytics-cli/main/.trunk/ruby-build.tar.gz
        strip_components: 1
tools:
  runtimes:
    - ruby
    - node
  enabled:
    - gh@2.93.0
    - pnpm@11.5.1
